<body>

    <section id="p_listen3" class="PL3-section" aria-label="OpaHiFi">
        <div class="PL3-wrap">
            <div class="PL3-card">
                <nav class="PL3-nav" aria-label="OpaHiFi navigation">
                    <div class="PL3-navInner">
                        <div class="PL3-heroTitle">OpaHiFi</div>
                        <div class="PL3-btnRow" aria-label="Actions">
                            <button class="PL3-heroBtn" type="button" data-pl3-action="listen">
                                <span class="PL3-heroBtn-text">Stream</span>
                                <div class="PL3-heroBtn-icons" hidden>
                                    <a href="https://open.spotify.com/artist/1WD2qPlo13H0gWENdreAsP" target="_blank"
                                        rel="noopener" aria-label="Spotify">
                                        <img class="PL3-heroBtn-icon" src="https://cdn.simpleicons.org/spotify/FFFFFF"
                                            alt="Spotify">
                                    </a>
                                    <a href="https://music.apple.com/us/artist/opahifi/1867221913" target="_blank"
                                        rel="noopener" aria-label="Apple Music">
                                        <img class="PL3-heroBtn-icon" src="https://cdn.simpleicons.org/apple/FFFFFF"
                                            alt="Apple Music">
                                    </a>
                                    <a href="https://music.youtube.com/channel/UCyCvRtCK73bbnKqSzC1FOVA" target="_blank"
                                        rel="noopener" aria-label="YouTube Music">
                                        <img class="PL3-heroBtn-icon"
                                            src="https://cdn.simpleicons.org/youtubemusic/FFFFFF" alt="YouTube Music">
                                    </a>
                                    <a href="https://www.youtube.com/@OpaHiFi" target="_blank" rel="noopener"
                                        aria-label="YouTube">
                                        <img class="PL3-heroBtn-icon" src="https://cdn.simpleicons.org/youtube/FFFFFF"
                                            alt="YouTube">
                                    </a>
                                    <a href="https://music.amazon.com/artists/B0GCXHGG79/opahifi" target="_blank"
                                        rel="noopener" aria-label="Amazon Music">
                                        <i class="fa-brands fa-amazon PL3-heroBtn-icon" aria-hidden="true"></i>
                                    </a>
                                    <span class="PL3-heroBtn-close" data-pl3-close-btn aria-label="Close">×</span>
                                </div>
                            </button>
                            <button class="PL3-heroBtn" type="button" data-pl3-action="follow">
                                <span class="PL3-heroBtn-text">Follow</span>
                                <div class="PL3-heroBtn-icons" hidden>
                                    <a href="https://instagram.com/opahifi" target="_blank" rel="noopener"
                                        aria-label="Instagram">
                                        <img class="PL3-heroBtn-icon" src="https://cdn.simpleicons.org/instagram/FFFFFF"
                                            alt="Instagram">
                                    </a>
                                    <a href="https://www.youtube.com/@OpaHiFi" target="_blank" rel="noopener"
                                        aria-label="YouTube">
                                        <img class="PL3-heroBtn-icon" src="https://cdn.simpleicons.org/youtube/FFFFFF"
                                            alt="YouTube">
                                    </a>
                                    <a href="https://tiktok.com/@opahifi" target="_blank" rel="noopener"
                                        aria-label="TikTok">
                                        <img class="PL3-heroBtn-icon" src="https://cdn.simpleicons.org/tiktok/FFFFFF"
                                            alt="TikTok">
                                    </a>
                                    <a href="mailto:contact@opahifi.com" aria-label="Email">
                                        <svg class="PL3-heroBtn-icon" xmlns="http://www.w3.org/2000/svg"
                                            viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#FFFFFF"
                                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                                            aria-hidden="true" focusable="false">

                                </div>
                            </button>
                            <button class="PL3-heroBtn" type="button" data-pl3-action="shop">
                                <span class="PL3-heroBtn-text">Shop</span>

                <div class="PL3-split">
                    <!-- 1) Header -->
                    <div class="PL3-part PL3-part--header" aria-label="Header">
                        <div class="PL3-heroRow" aria-label="Hero">
                            <div class="PL3-heroText" aria-label="Title and slogan">
                                <div class="PL3-heroSlogan">Authentic sound for when <br> the world gets too loud.
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 3) Highlight -->
                    <div class="PL3-part PL3-part--highlight" aria-label="Highlight">
                        <div class="PL3-tabs" data-pl3-tabs>

                            <!-- Left: Tab navigation -->
                            <div class="PL3-tabNav" role="tablist" aria-label="Content sections">
                                <button class="PL3-tabBtn" role="tab" aria-selected="true"
                                    aria-controls="PL3-tabPanel-release" data-pl3-tab="release">
                                    <span class="PL3-tabLabel">Focus</span>

                                <button class="PL3-tabBtn" role="tab" aria-selected="false"
                                    aria-controls="PL3-tabPanel-videos" data-pl3-tab="videos">
                                    <span class="PL3-tabLabel">Videos</span>
                                </button>
                                <button class="PL3-tabBtn" role="tab" aria-selected="false"
                                    aria-controls="PL3-tabPanel-about" data-pl3-tab="about">
                                    <span class="PL3-tabLabel">About</span>
                                </button>
                            </div>

                            <!-- Right: Tab panels -->
                            <div class="PL3-tabPanels">
                                <div class="PL3-tabPanel" id="PL3-tabPanel-release" role="tabpanel"
                                    aria-label="Latest Release">
                                    <div class="PL3-upcoming" aria-label="Upcoming single">
                                        <!-- Left: Image -->
                                        <button class="PL3-upcomingArtWrap" type="button"
                                            aria-label="Open Full-Mindness" data-pl3-group="full-mindness">
                                            <img class="PL3-upcomingArt" src="img/music/base/base-fullmindness.png"
                                                alt="Upcoming single cover" loading="lazy"
                                                onerror="this.src='img/music/opahifi_album.png'">
                                        </button>
                                        <!-- Right: Drop Message and Buttons -->
                                        <div class="PL3-upcomingRight">
                                            <div class="PL3-upcomingDesc">Latest<br>Release</div>
                                            <div class="PL3-upcomingButtons" aria-label="Release actions">
                                                <button class="PL3-upcomingBtn PL3-upcomingPreviewBtn" type="button"
                                                    data-pl3-group="full-mindness" aria-label="Open Full-Mindness">
                                                    <i class="fa-solid fa-play" aria-hidden="true"></i>
                                                    <span>Listen</span>
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="PL3-tabPanel" id="PL3-tabPanel-videos" role="tabpanel" aria-label="Videos"
                                    hidden>
                                    <div class="PL3-videoGrid">
                                        <div class="PL3-videoCard">
                                            <img class="PL3-videoThumb" src="img/opa/video1-meetopa.png" alt="Meet Opa"
                                                loading="lazy">
                                            <div class="PL3-videoTitle">MEET<br>OPA</div>
                                            <a class="PL3-videoWatchBtn" href="https://www.youtube.com/@OpaHiFi"
                                                target="_blank" rel="noopener" aria-label="Watch Meet Opa">
                                                <i class="fa-solid fa-play" aria-hidden="true"></i> Watch
                                            </a>
                                        </div>
                                        <div class="PL3-videoCard">
                                            <img class="PL3-videoThumb" src="img/opa/video2-videoclips.png"
                                                alt="Video Clips" loading="lazy">
                                            <div class="PL3-videoTitle">VIDEO<br>CLIPS</div>
                                            <a class="PL3-videoWatchBtn" href="https://www.youtube.com/@OpaHiFi"
                                                target="_blank" rel="noopener" aria-label="Watch Video Clips">
                                                <i class="fa-solid fa-play" aria-hidden="true"></i> Watch
                                            </a>
                                        </div>
                                        <div class="PL3-videoCard">
                                            <img class="PL3-videoThumb" src="img/opa/video3-lyricsshorts.png"
                                                alt="Lyrics Shorts" loading="lazy">
                                            <div class="PL3-videoTitle">LYRICS<br>SHORTS</div>
                                            <a class="PL3-videoWatchBtn" href="https://www.youtube.com/@OpaHiFi"
                                                target="_blank" rel="noopener" aria-label="Watch Lyrics Shorts">
                                                <i class="fa-solid fa-play" aria-hidden="true"></i> Watch
                                            </a>
                                        </div>
                                    </div>
                                </div>
                                <div class="PL3-tabPanel" id="PL3-tabPanel-about" role="tabpanel" aria-label="About"

                                    <div class="PL3-tabPlaceholder">
                                        <i class="fa-solid fa-music" aria-hidden="true"></i>
                                        <span>About OpaHiFi</span>
                                    </div>
                                </div>
                            </div>

                        </div>

                                <button class="PL3-playlistPill" type="button" data-pl3-playlist-toggle

                                    <span class="PL3-playlistPillLabel"><i
                                            class="fa-solid fa-play PL3-playlistPillPlayIcon"

                                            class="PL3-playlistListText">List</span></span>

                                            <img class="PL3-playlistPillIcon"
                                                src="https://cdn.simpleicons.org/spotify/4A1D2F" alt="Spotify">
                                        </a>
                                        <a class="PL3-playlistPillLink"
                                            href="https://music.youtube.com/playlist?list=PLtGnlTqdsNV2QBkI-_1QFuidj3alcuLHF&si=S9qhguENixnuD3Ps"
                                            target="_blank" rel="noopener" aria-label="YouTube Music playlist">
                                            <img class="PL3-playlistPillIcon"
                                                src="https://cdn.simpleicons.org/youtubemusic/4A1D2F"
                                                alt="YouTube Music">
                                        </a>
                                        <a class="PL3-playlistPillLink"
                                            href="https://www.youtube.com/playlist?list=PLtGnlTqdsNV2QBkI-_1QFuidj3alcuLHF"
                                            target="_blank" rel="noopener" aria-label="YouTube playlist">

                                                src="https://cdn.simpleicons.org/youtube/4A1D2F" alt="YouTube">

                                        <span class="PL3-heroBtn-close" data-pl3-playlist-close
                                            aria-label="Close">×</span>

                                </button>
                            </div>

                        <div class="PL3-gallery" aria-label="OpaHiFi groups">

                            <button class="PL3-galleryItemBtn" type="button" aria-label="Open Opa pa pa party"

                                    onerror="this.src='img/music/opahifi_album.png'">

                            <button class="PL3-galleryItemBtn" type="button" aria-label="Open Splenda Love Rabbit Hell"

                                    onerror="this.src='img/music/opahifi_album.png'">

                            <button class="PL3-galleryItemBtn" type="button" aria-label="Open Believe the Truth fairy"

                                    onerror="this.src='img/music/opahifi_album.png'">
                            </button>

                            <button class="PL3-galleryItemBtn" type="button" aria-label="Open Full-Mindness"

                                <img class="PL3-galleryImg" src="img/music/base/base-fullmindness.png"
                                    alt="Full-Mindness cover" loading="lazy"
                                    onerror="this.src='img/music/opahifi_album.png'">

                            <button class="PL3-galleryItemBtn" type="button" aria-label="Open Let's not do Brunch"
                                data-pl3-group="lets-not-do-brunch">
                                <img class="PL3-galleryImg" src="img/music/base/base-letsnotdobrunch.png"

                <div class="PL3-groupPanel" id="PL3-group-panel" aria-hidden="true">

                            <div class="PL3-groupPanelGroupMeta" data-pl3-group-meta>
                                <div class="PL3-groupPanelGroupTitle" data-pl3-group-title></div>
                                <div class="PL3-groupPanelGroupCount" data-pl3-group-count></div>

                        <div class="PL3-groupPanelMeta">

                        </div>
                        <div class="PL3-groupPanelFooter">

                                <span aria-hidden="true">×</span>
                            </button>

                    </div>
                </div>

    <div class="PL3-modal PL3-previewModal" id="PL3-preview-modal" hidden aria-hidden="true">
        <div class="PL3-previewOverlay" data-pl3-preview-close></div>
        <div class="PL3-previewPanel" role="dialog" aria-modal="true" aria-label="Video preview">
            <div class="PL3-previewInner">
                <div class="PL3-previewHeader">
                    <div class="PL3-previewTitle">Preview</div>
                    <div class="PL3-previewHeaderActions">
                        <button class="PL3-previewSound" type="button" data-pl3-preview-sound aria-label="Toggle sound">
                            <i class="fa-solid fa-volume-high" aria-hidden="true"></i>

                        </button>
                        <button class="PL3-previewClose" type="button" data-pl3-preview-close
                            aria-label="Close">×</button>
                    </div>
                </div>
                <div class="PL3-previewFrame">
                    <iframe id="PL3-preview-iframe" title="YouTube preview"
                        allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>
                </div>
            </div>
        </div>
