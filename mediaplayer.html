<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rounded Art Audio Player</title>
  <style>
    :root {
      --ohv-bg: #0b0f17;
      --ohv-panel: rgba(255, 255, 255, 0.08);
      --ohv-panel-border: rgba(255, 255, 255, 0.12);
      --ohv-text: #f4f7fb;
      --ohv-muted: #b7c0d1;
      --ohv-accent: #7aa2ff;
      --ohv-accent-2: #b879ff;
      --ohv-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      --ohv-radius: 22px;
      --ohv-art-size: 150px;
      --ohv-stage-size: calc(var(--ohv-art-size) + 6px);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      font-family: Inter, Arial, Helvetica, sans-serif;
      color: var(--ohv-text);
      background:
        radial-gradient(circle at top, rgba(122, 162, 255, 0.18), transparent 28%),
        radial-gradient(circle at bottom right, rgba(184, 121, 255, 0.14), transparent 24%),
        var(--ohv-bg);
    }

    .ohv-app {
      min-height: 100%;
      display: grid;
      place-items: center;
      padding: 16px;
    }

    .ohv-shell {
      width: min(280px, 100%);
      display: grid;
      gap: 12px;
    }

    .ohv-card {
      display: grid;
      gap: 12px;
      background: var(--ohv-panel);
      border: 1px solid var(--ohv-panel-border);
      border-radius: 18px;
      box-shadow: var(--ohv-shadow);
      backdrop-filter: blur(12px);
      padding: 12px;
    }

    .ohv-topbar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      text-align: center;
    }

    .ohv-titlewrap {
      display: grid;
      gap: 4px;
      justify-items: center;
    }

    .ohv-title {
      margin: 0;
      font-size: 1rem;
      line-height: 1.1;
    }

    .ohv-subtitle {
      margin: 0;
      color: var(--ohv-muted);
      font-size: 0.78rem;
      line-height: 1.35;
    }

    .ohv-stage {
      position: relative;
      display: grid;
      place-items: center;
      width: min(var(--ohv-stage-size), 100%);
      aspect-ratio: 1 / 1;
      margin: 0 auto;
      border-radius: 22px;
      overflow: hidden;
      background: transparent;
    }

    .ohv-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .ohv-controls {
      display: grid;
      gap: 10px;
    }

    .ohv-buttonrow,
    .ohv-inputrow {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
    }

    .ohv-btn,
    .ohv-filelabel {
      appearance: none;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.08);
      color: var(--ohv-text);
      border-radius: 999px;
      padding: 8px 11px;
      font: inherit;
      font-size: 0.8rem;
      line-height: 1;
      cursor: pointer;
      transition: transform 120ms ease, background 120ms ease, border-color 120ms ease;
    }

    .ohv-btn:hover,
    .ohv-filelabel:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.24);
    }

    .ohv-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    .ohv-fileinput {
      display: none;
    }

    .ohv-timerow {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: var(--ohv-muted);
      font-size: 0.78rem;
      flex-wrap: nowrap;
    }

    .ohv-timepill {
      min-width: 54px;
      text-align: center;
      padding: 6px 8px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.06);
      font-size: 0.75rem;
    }

    .ohv-meta {
      display: grid;
      gap: 4px;
      justify-items: center;
      color: var(--ohv-muted);
      font-size: 0.72rem;
      text-align: center;
    }

    .ohv-note {
      font-size: 0.72rem;
      color: var(--ohv-muted);
      line-height: 1.35;
      text-align: center;
    }

    .ohv-status {
      min-height: 1.1em;
      font-size: 0.72rem;
      color: #ffb7c8;
      text-align: center;
    }

    @media (max-width: 640px) {
      .ohv-app {
        padding: 10px;
      }

      .ohv-shell {
        width: min(240px, 100%);
      }

      .ohv-stage {
        width: min(var(--ohv-stage-size), 100%);
        border-radius: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="ohv-app">
    <div class="ohv-shell">
      <section class="ohv-card">
        <div class="ohv-topbar">
          <div class="ohv-titlewrap">
            <h1 class="ohv-title">Rounded Art Audio Player</h1>
            <p class="ohv-subtitle">Upload audio + artwork. A dot moves around the rounded-square border.</p>
          </div>
        </div>

        <div class="ohv-stage">
          <canvas class="ohv-canvas" id="ohvCanvas"></canvas>
        </div>

        <div class="ohv-controls">
          <div class="ohv-inputrow">
            <label class="ohv-filelabel" for="ohvAudioInput">Choose audio</label>
            <input class="ohv-fileinput" id="ohvAudioInput" type="file" accept="audio/*" />

            <label class="ohv-filelabel" for="ohvArtInput">Choose artwork</label>
            <input class="ohv-fileinput" id="ohvArtInput" type="file" accept="image/*" />
          </div>

          <div class="ohv-buttonrow">
            <button class="ohv-btn" id="ohvPlayBtn" type="button">Play</button>
            <button class="ohv-btn" id="ohvPauseBtn" type="button">Pause</button>
            <button class="ohv-btn" id="ohvResetBtn" type="button">Reset</button>
          </div>

          <div class="ohv-timerow">
            <span class="ohv-timepill" id="ohvCurrentTime">0:00</span>
            <span>Dot follows border</span>
            <span class="ohv-timepill" id="ohvDuration">0:00</span>
          </div>

          <div class="ohv-meta">
            <span id="ohvFileName">No audio loaded</span>
            <span id="ohvArtName">Default art</span>
          </div>

          <div class="ohv-status" id="ohvStatus" aria-live="polite"></div>

          <div class="ohv-note">
            Tip: this is fully self-contained. Drop it into any site, or open it directly in a browser.
          </div>
        </div>
      </section>
    </div>
  </div>

  <audio id="ohvAudio" crossorigin="anonymous"></audio>

  <script>
    (() => {
      const ohvCanvas = document.getElementById('ohvCanvas');
      const ohvCtx = ohvCanvas.getContext('2d');
      const ohvAudio = document.getElementById('ohvAudio');

      const ohvAudioInput = document.getElementById('ohvAudioInput');
      const ohvArtInput = document.getElementById('ohvArtInput');
      const ohvPlayBtn = document.getElementById('ohvPlayBtn');
      const ohvPauseBtn = document.getElementById('ohvPauseBtn');
      const ohvResetBtn = document.getElementById('ohvResetBtn');
      const ohvCurrentTime = document.getElementById('ohvCurrentTime');
      const ohvDuration = document.getElementById('ohvDuration');
      const ohvFileName = document.getElementById('ohvFileName');
      const ohvArtName = document.getElementById('ohvArtName');
      const ohvStatus = document.getElementById('ohvStatus');

      let ohvAnimationFrame = null;
      let ohvObjectUrl = null;
      let ohvArtUrl = null;
      let ohvHasLoadedArt = false;
      let ohvAudioReady = false;
      let ohvSelectedAudioMime = '';

      const ohvArtImage = new Image();
      ohvArtImage.crossOrigin = 'anonymous';

      function ohvSetStatus(message = '') {
        ohvStatus.textContent = message;
      }

      function ohvAssert(condition, message) {
        if (!condition) {
          throw new Error(`Test failed: ${message}`);
        }
      }

      function createDefaultArt() {
        const ohvSize = 900;
        const ohvOffscreen = document.createElement('canvas');
        ohvOffscreen.width = ohvSize;
        ohvOffscreen.height = ohvSize;
        const ohvOffCtx = ohvOffscreen.getContext('2d');

        ohvOffCtx.fillStyle = '#ffffff';
        ohvOffCtx.fillRect(0, 0, ohvSize, ohvSize);

        return ohvOffscreen.toDataURL('image/png');
      }

      function ohvIsImageDrawable(image) {
        return Boolean(
          image &&
          image.complete &&
          image.naturalWidth > 0 &&
          image.naturalHeight > 0,
        );
      }

      function ohvCanBrowserPlayMime(mime) {
        if (!mime) return true;
        const ohvResult = ohvAudio.canPlayType(mime);
        return ohvResult === 'probably' || ohvResult === 'maybe';
      }

      function ohvGetAudioErrorMessage(error, fileName = 'that audio file') {
        switch (error?.code) {
          case 1:
            return 'Audio loading was aborted.';
          case 2:
            return 'A network error interrupted audio loading.';
          case 3:
            return `The browser could not decode ${fileName}.`;
          case 4:
            return `This browser cannot play ${fileName}. Try MP3 or WAV.`;
          default:
            return 'Audio playback failed. Try another file.';
        }
      }

      function ohvClearAudioSource() {
        ohvAudio.pause();
        ohvAudio.removeAttribute('src');
        ohvAudio.load();
        ohvAudioReady = false;
        ohvSelectedAudioMime = '';
        ohvFileName.textContent = 'No audio loaded';
        updateTimeUi();
      }

      function ohvWaitForAudioReady() {
        if (ohvAudioReady || ohvAudio.readyState >= 2) {
          ohvAudioReady = true;
          return Promise.resolve();
        }

        return new Promise((resolve, reject) => {
          const ohvCleanup = () => {
            ohvAudio.removeEventListener('canplay', ohvOnCanPlay);
            ohvAudio.removeEventListener('error', ohvOnError);
          };

          const ohvOnCanPlay = () => {
            ohvCleanup();
            ohvAudioReady = true;
            resolve();
          };

          const ohvOnError = () => {
            ohvCleanup();
            reject(new Error(ohvGetAudioErrorMessage(ohvAudio.error, ohvFileName.textContent)));
          };

          ohvAudio.addEventListener('canplay', ohvOnCanPlay, { once: true });
          ohvAudio.addEventListener('error', ohvOnError, { once: true });
        });
      }

      function ohvLoadArtSource(src, options = {}) {
        const { name = 'Artwork' } = options;
        ohvHasLoadedArt = false;

        return new Promise((resolve, reject) => {
          ohvArtImage.onload = () => {
            ohvHasLoadedArt = true;
            ohvArtName.textContent = name;
            drawFrame();
            resolve();
          };

          ohvArtImage.onerror = () => {
            ohvHasLoadedArt = false;
            reject(new Error(`Could not load image source: ${name}`));
          };

          ohvArtImage.src = src;
        });
      }

      async function ohvApplyFallbackArt() {
        const ohvFallbackSrc = createDefaultArt();
        await ohvLoadArtSource(ohvFallbackSrc, {
          name: 'Default art',
        });
      }

      function resizeCanvas() {
        const ohvRect = ohvCanvas.getBoundingClientRect();
        const ohvRatio = Math.max(window.devicePixelRatio || 1, 1);
        ohvCanvas.width = Math.floor(ohvRect.width * ohvRatio);
        ohvCanvas.height = Math.floor(ohvRect.height * ohvRatio);
        ohvCtx.setTransform(ohvRatio, 0, 0, ohvRatio, 0, 0);
        drawFrame();
      }

      function formatTime(ohvSeconds) {
        if (!Number.isFinite(ohvSeconds)) return '0:00';
        const ohvMins = Math.floor(ohvSeconds / 60);
        const ohvSecs = Math.floor(ohvSeconds % 60);
        return `${ohvMins}:${String(ohvSecs).padStart(2, '0')}`;
      }

      function updateTimeUi() {
        ohvCurrentTime.textContent = formatTime(ohvAudio.currentTime || 0);
        ohvDuration.textContent = formatTime(ohvAudio.duration || 0);
      }

      function ohvGetPlaybackProgress() {
        if (!Number.isFinite(ohvAudio.duration) || ohvAudio.duration <= 0) {
          return 0;
        }

        const ohvProgress = ohvAudio.currentTime / ohvAudio.duration;
        return Math.min(1, Math.max(0, ohvProgress));
      }

      function ohvIsPlaying() {
        return !ohvAudio.paused && !ohvAudio.ended && ohvAudio.currentTime > 0;
      }

      function ohvGetArtScale(timeMs) {
        if (!ohvIsPlaying()) {
          return 1;
        }

        return 1 + (Math.sin(timeMs * 0.0019) * 0.012);
      }

      function ohvGetDotScale(timeMs) {
        if (!ohvIsPlaying()) {
          return 1;
        }

        return 1 + (0.14 * ((Math.sin(timeMs * 0.0062) + 1) / 2));
      }

      function ohvGetProgressPathMetrics(ohvArtSize, ohvCornerRadius, ohvDotRadius) {
        return {
          trackSize: Math.max(0, ohvArtSize),
          trackRadius: Math.max(2, ohvCornerRadius),
        };
      }

      function ohvGetCenteredArtMetrics(ohvStageSize) {
        const ohvArtSize = Math.max(0, ohvStageSize - 6);
        const ohvOffset = (ohvStageSize - ohvArtSize) / 2;
        return {
          artSize: ohvArtSize,
          artOffset: ohvOffset,
        };
      }

      function ohvBuildRoundedRectPath(ctx, x, y, width, height, radius) {
        const ohvRadius = Math.min(radius, width / 2, height / 2);

        ctx.beginPath();
        ctx.moveTo(x + ohvRadius, y);
        ctx.lineTo(x + width - ohvRadius, y);
        ctx.arcTo(x + width, y, x + width, y + ohvRadius, ohvRadius);
        ctx.lineTo(x + width, y + height - ohvRadius);
        ctx.arcTo(x + width, y + height, x + width - ohvRadius, y + height, ohvRadius);
        ctx.lineTo(x + ohvRadius, y + height);
        ctx.arcTo(x, y + height, x, y + height - ohvRadius, ohvRadius);
        ctx.lineTo(x, y + ohvRadius);
        ctx.arcTo(x, y, x + ohvRadius, y, ohvRadius);
        ctx.closePath();
      }

      function ohvGetPointOnRoundedSquare(centerX, centerY, size, radius, progress) {
        const ohvHalf = size / 2;
        const ohvR = Math.min(radius, ohvHalf);
        const ohvStraight = size - 2 * ohvR;
        const ohvHalfTop = size / 2 - ohvR;
        const ohvQuarterArc = (Math.PI * ohvR) / 2;
        const ohvTotalLength = (2 * ohvStraight) + (2 * ohvStraight) + (2 * Math.PI * ohvR);
        let ohvDistance = ((progress % 1) + 1) % 1 * ohvTotalLength;

        const ohvLeft = centerX - ohvHalf;
        const ohvTop = centerY - ohvHalf;
        const ohvRight = centerX + ohvHalf;
        const ohvBottom = centerY + ohvHalf;

        const ohvSegments = [
          { type: 'line', length: ohvHalfTop, from: { x: centerX, y: ohvTop }, to: { x: ohvRight - ohvR, y: ohvTop } },
          { type: 'arc', length: ohvQuarterArc, cx: ohvRight - ohvR, cy: ohvTop + ohvR, start: -Math.PI / 2, end: 0 },
          { type: 'line', length: ohvStraight, from: { x: ohvRight, y: ohvTop + ohvR }, to: { x: ohvRight, y: ohvBottom - ohvR } },
          { type: 'arc', length: ohvQuarterArc, cx: ohvRight - ohvR, cy: ohvBottom - ohvR, start: 0, end: Math.PI / 2 },
          { type: 'line', length: ohvStraight, from: { x: ohvRight - ohvR, y: ohvBottom }, to: { x: ohvLeft + ohvR, y: ohvBottom } },
          { type: 'arc', length: ohvQuarterArc, cx: ohvLeft + ohvR, cy: ohvBottom - ohvR, start: Math.PI / 2, end: Math.PI },
          { type: 'line', length: ohvStraight, from: { x: ohvLeft, y: ohvBottom - ohvR }, to: { x: ohvLeft, y: ohvTop + ohvR } },
          { type: 'arc', length: ohvQuarterArc, cx: ohvLeft + ohvR, cy: ohvTop + ohvR, start: Math.PI, end: (Math.PI * 3) / 2 },
          { type: 'line', length: ohvHalfTop, from: { x: ohvLeft + ohvR, y: ohvTop }, to: { x: centerX, y: ohvTop } },
        ];

        for (const ohvSegment of ohvSegments) {
          if (ohvDistance <= ohvSegment.length || ohvSegment === ohvSegments[ohvSegments.length - 1]) {
            const ohvT = ohvSegment.length === 0 ? 0 : ohvDistance / ohvSegment.length;

            if (ohvSegment.type === 'line') {
              return {
                x: ohvSegment.from.x + ((ohvSegment.to.x - ohvSegment.from.x) * ohvT),
                y: ohvSegment.from.y + ((ohvSegment.to.y - ohvSegment.from.y) * ohvT),
              };
            }

            const ohvAngle = ohvSegment.start + ((ohvSegment.end - ohvSegment.start) * ohvT);
            return {
              x: ohvSegment.cx + Math.cos(ohvAngle) * ohvR,
              y: ohvSegment.cy + Math.sin(ohvAngle) * ohvR,
            };
          }

          ohvDistance -= ohvSegment.length;
        }

        return { x: centerX, y: ohvTop };
      }

      async function loadImageFile(ohvFile) {
        if (!ohvFile) return;

        if (ohvArtUrl) {
          URL.revokeObjectURL(ohvArtUrl);
          ohvArtUrl = null;
        }

        ohvArtUrl = URL.createObjectURL(ohvFile);

        try {
          ohvSetStatus('Loading artwork...');
          await ohvLoadArtSource(ohvArtUrl, {
            name: ohvFile.name,
          });
          ohvSetStatus('');
        } catch (error) {
          console.error(error);
          ohvSetStatus('Artwork could not load. Reverted to default art.');
          await ohvApplyFallbackArt();
        }
      }

      function loadAudioFile(ohvFile) {
        if (!ohvFile) return;

        if (!ohvFile.type || !ohvFile.type.startsWith('audio/')) {
          ohvClearAudioSource();
          ohvSetStatus('That file is not recognized as audio. Choose an MP3 or WAV file.');
          return;
        }

        if (!ohvCanBrowserPlayMime(ohvFile.type)) {
          ohvClearAudioSource();
          ohvSetStatus(`This browser cannot play ${ohvFile.name}. Try MP3 or WAV.`);
          return;
        }

        if (ohvObjectUrl) {
          URL.revokeObjectURL(ohvObjectUrl);
        }

        ohvAudio.pause();
        ohvAudioReady = false;
        ohvSelectedAudioMime = ohvFile.type;
        ohvObjectUrl = URL.createObjectURL(ohvFile);
        ohvAudio.src = ohvObjectUrl;
        ohvAudio.load();
        ohvFileName.textContent = ohvFile.name;
        ohvSetStatus('Loading audio...');
        updateTimeUi();
      }

      function drawFallbackArt(ohvX, ohvY, ohvSize, ohvRadius, ohvScale = 1) {
        const ohvCenterX = ohvX + (ohvSize / 2);
        const ohvCenterY = ohvY + (ohvSize / 2);

        ohvCtx.save();
        ohvCtx.translate(ohvCenterX, ohvCenterY);
        ohvCtx.scale(ohvScale, ohvScale);
        ohvCtx.translate(-ohvCenterX, -ohvCenterY);

        const ohvGradient = ohvCtx.createLinearGradient(
          ohvX,
          ohvY,
          ohvX + ohvSize,
          ohvY + ohvSize,
        );
        ohvGradient.addColorStop(0, '#7aa2ff');
        ohvGradient.addColorStop(0.5, '#b879ff');
        ohvGradient.addColorStop(1, '#ff7dbb');

        ohvBuildRoundedRectPath(ohvCtx, ohvX, ohvY, ohvSize, ohvSize, ohvRadius);
        ohvCtx.fillStyle = ohvGradient;
        ohvCtx.fill();

        ohvCtx.fillStyle = 'rgba(255,255,255,0.9)';
        ohvCtx.textAlign = 'center';
        ohvCtx.textBaseline = 'middle';
        ohvCtx.font = `bold ${Math.max(16, ohvSize * 0.1)}px Inter, Arial, sans-serif`;
        ohvCtx.fillText('ART', ohvX + (ohvSize / 2), ohvY + (ohvSize * 0.46));
        ohvCtx.font = `${Math.max(10, ohvSize * 0.042)}px Inter, Arial, sans-serif`;
        ohvCtx.fillText('Upload image', ohvX + (ohvSize / 2), ohvY + (ohvSize * 0.59));
        ohvCtx.restore();
      }

      function drawArt(ohvCenterX, ohvCenterY, ohvArtSize, ohvCornerRadius, timeMs) {
        const ohvCanDrawImage = ohvHasLoadedArt && ohvIsImageDrawable(ohvArtImage);
        const ohvX = ohvCenterX - (ohvArtSize / 2);
        const ohvY = ohvCenterY - (ohvArtSize / 2);
        const ohvArtScale = ohvGetArtScale(timeMs);
        const ohvScaledSize = ohvArtSize * ohvArtScale;
        const ohvScaledX = ohvCenterX - (ohvScaledSize / 2);
        const ohvScaledY = ohvCenterY - (ohvScaledSize / 2);

        if (ohvCanDrawImage) {
          ohvCtx.save();
          ohvBuildRoundedRectPath(ohvCtx, ohvX, ohvY, ohvArtSize, ohvArtSize, ohvCornerRadius);
          ohvCtx.clip();
          ohvCtx.drawImage(ohvArtImage, ohvScaledX, ohvScaledY, ohvScaledSize, ohvScaledSize);
          ohvCtx.restore();
        } else {
          drawFallbackArt(ohvX, ohvY, ohvArtSize, ohvCornerRadius, ohvArtScale);
        }

        const ohvBorderGradient = ohvCtx.createLinearGradient(
          ohvX,
          ohvY,
          ohvX + ohvArtSize,
          ohvY + ohvArtSize,
        );
        ohvBorderGradient.addColorStop(0, 'rgba(122,162,255,0.88)');
        ohvBorderGradient.addColorStop(0.5, 'rgba(184,121,255,0.92)');
        ohvBorderGradient.addColorStop(1, 'rgba(255,125,187,0.92)');

        ohvCtx.lineWidth = Math.max(2, ohvArtSize * 0.012);
        ohvCtx.strokeStyle = ohvBorderGradient;
        ohvBuildRoundedRectPath(ohvCtx, ohvX + 1, ohvY + 1, ohvArtSize - 2, ohvArtSize - 2, Math.max(0, ohvCornerRadius - 1));
        ohvCtx.stroke();
      }

      function drawPlaybackProgress(ohvCenterX, ohvCenterY, ohvArtSize, ohvCornerRadius, timeMs) {
        const ohvProgress = ohvGetPlaybackProgress();
        const ohvBaseDotRadius = Math.max(2.75, ohvArtSize * 0.012);
        const ohvDotRadius = ohvBaseDotRadius * ohvGetDotScale(timeMs);
        const ohvPathMetrics = ohvGetProgressPathMetrics(ohvArtSize, ohvCornerRadius, ohvDotRadius);
        const ohvTrackSize = ohvPathMetrics.trackSize;
        const ohvTrackRadius = ohvPathMetrics.trackRadius;
        const ohvTrackX = ohvCenterX - (ohvTrackSize / 2);
        const ohvTrackY = ohvCenterY - (ohvTrackSize / 2);
        const ohvDotPoint = ohvGetPointOnRoundedSquare(
          ohvCenterX,
          ohvCenterY,
          ohvTrackSize,
          ohvTrackRadius,
          ohvProgress,
        );
        const ohvBaseLineWidth = Math.max(2.5, ohvDotRadius * 1.05);

        ohvCtx.save();
        ohvCtx.lineCap = 'round';
        ohvCtx.lineJoin = 'round';

        ohvCtx.lineWidth = ohvBaseLineWidth + 1.6;
        ohvCtx.strokeStyle = 'rgba(7, 10, 18, 0.45)';
        ohvBuildRoundedRectPath(
          ohvCtx,
          ohvTrackX + 1,
          ohvTrackY + 1,
          ohvTrackSize - 2,
          ohvTrackSize - 2,
          Math.max(0, ohvTrackRadius - 1),
        );
        ohvCtx.stroke();

        ohvCtx.lineWidth = ohvBaseLineWidth;
        ohvCtx.strokeStyle = 'rgba(255,255,255,0.14)';
        ohvBuildRoundedRectPath(
          ohvCtx,
          ohvTrackX + 1,
          ohvTrackY + 1,
          ohvTrackSize - 2,
          ohvTrackSize - 2,
          Math.max(0, ohvTrackRadius - 1),
        );
        ohvCtx.stroke();

        if (ohvProgress > 0) {
          const ohvProgressSteps = Math.max(48, Math.ceil(ohvProgress * 220));
          const ohvProgressGradient = ohvCtx.createLinearGradient(
            ohvTrackX,
            ohvTrackY,
            ohvTrackX + ohvTrackSize,
            ohvTrackY + ohvTrackSize,
          );
          ohvProgressGradient.addColorStop(0, 'rgba(36, 161, 255, 0.95)');
          ohvProgressGradient.addColorStop(0.5, 'rgba(139, 92, 246, 0.98)');
          ohvProgressGradient.addColorStop(1, 'rgba(255, 58, 155, 1)');

          ohvCtx.beginPath();
          const ohvStartPoint = ohvGetPointOnRoundedSquare(
            ohvCenterX,
            ohvCenterY,
            ohvTrackSize,
            ohvTrackRadius,
            0,
          );
          ohvCtx.moveTo(ohvStartPoint.x, ohvStartPoint.y);

          for (let ohvIndex = 1; ohvIndex <= ohvProgressSteps; ohvIndex += 1) {
            const ohvT = (ohvIndex / ohvProgressSteps) * ohvProgress;
            const ohvPoint = ohvGetPointOnRoundedSquare(
              ohvCenterX,
              ohvCenterY,
              ohvTrackSize,
              ohvTrackRadius,
              ohvT,
            );
            ohvCtx.lineTo(ohvPoint.x, ohvPoint.y);
          }

          ohvCtx.strokeStyle = 'rgba(7, 10, 18, 0.34)';
          ohvCtx.lineWidth = ohvBaseLineWidth + 1.2;
          ohvCtx.stroke();

          ohvCtx.shadowBlur = 10;
          ohvCtx.shadowColor = 'rgba(255,58,155,0.28)';
          ohvCtx.strokeStyle = ohvProgressGradient;
          ohvCtx.lineWidth = ohvBaseLineWidth;
          ohvCtx.stroke();
          ohvCtx.shadowBlur = 0;
        }

        ohvCtx.restore();

        const ohvDotGradient = ohvCtx.createLinearGradient(
          ohvDotPoint.x - ohvDotRadius,
          ohvDotPoint.y - ohvDotRadius,
          ohvDotPoint.x + ohvDotRadius,
          ohvDotPoint.y + ohvDotRadius,
        );
        ohvDotGradient.addColorStop(0, 'rgba(36,161,255,1)');
        ohvDotGradient.addColorStop(0.5, 'rgba(139,92,246,1)');
        ohvDotGradient.addColorStop(1, 'rgba(255,58,155,1)');

        ohvCtx.beginPath();
        ohvCtx.arc(ohvDotPoint.x, ohvDotPoint.y, Math.max(3.8, ohvDotRadius * 1.15), 0, Math.PI * 2);
        ohvCtx.fillStyle = 'rgba(7, 10, 18, 0.45)';
        ohvCtx.fill();

        ohvCtx.fillStyle = ohvDotGradient;
        ohvCtx.shadowBlur = 14;
        ohvCtx.shadowColor = 'rgba(255,58,155,0.34)';
        ohvCtx.beginPath();
        ohvCtx.arc(ohvDotPoint.x, ohvDotPoint.y, Math.max(3.1, ohvDotRadius), 0, Math.PI * 2);
        ohvCtx.fill();
        ohvCtx.shadowBlur = 0;
      }

      function drawFrame(timeMs = performance.now()) {
        const ohvWidth = ohvCanvas.clientWidth;
        const ohvHeight = ohvCanvas.clientHeight;
        if (!ohvWidth || !ohvHeight) return;

        ohvCtx.clearRect(0, 0, ohvWidth, ohvHeight);

        const ohvCenterX = ohvWidth / 2;
        const ohvCenterY = ohvHeight / 2;
        const ohvMinSide = Math.min(ohvWidth, ohvHeight);
        const ohvArtMetrics = ohvGetCenteredArtMetrics(ohvMinSide);
        const ohvArtSize = ohvArtMetrics.artSize;
        const ohvCornerRadius = ohvArtSize * 0.14;

        drawArt(ohvCenterX, ohvCenterY, ohvArtSize, ohvCornerRadius, timeMs);
        drawPlaybackProgress(ohvCenterX, ohvCenterY, ohvArtSize, ohvCornerRadius, timeMs);
      }

      function animate(timeMs = performance.now()) {
        drawFrame(timeMs);
        ohvAnimationFrame = requestAnimationFrame(animate);
      }

      async function playAudio() {
        if (!ohvAudio.src) {
          ohvSetStatus('Choose an audio file first.');
          return;
        }

        if (ohvSelectedAudioMime && !ohvCanBrowserPlayMime(ohvSelectedAudioMime)) {
          ohvSetStatus(`This browser cannot play ${ohvFileName.textContent}. Try MP3 or WAV.`);
          return;
        }

        if (!ohvAudioReady && ohvAudio.readyState < 2) {
          await ohvWaitForAudioReady();
        }

        await ohvAudio.play();
        ohvSetStatus('');
      }

      function pauseAudio() {
        ohvAudio.pause();
      }

      function resetAudio() {
        ohvAudio.pause();
        ohvAudio.currentTime = 0;
        updateTimeUi();
        drawFrame();
      }

      function runTests() {
        ohvAssert(formatTime(0) === '0:00', 'formatTime should render zero');
        ohvAssert(formatTime(65) === '1:05', 'formatTime should pad seconds');
        ohvAssert(formatTime(Number.NaN) === '0:00', 'formatTime should guard NaN');
        ohvAssert(ohvIsImageDrawable(null) === false, 'ohvIsImageDrawable should reject null');
        ohvAssert(ohvIsImageDrawable({ complete: true, naturalWidth: 0, naturalHeight: 10 }) === false, 'ohvIsImageDrawable should reject zero width');
        ohvAssert(ohvIsImageDrawable({ complete: true, naturalWidth: 10, naturalHeight: 10 }) === true, 'ohvIsImageDrawable should accept loaded dimensions');
        ohvAssert(ohvCanBrowserPlayMime('') === true, 'ohvCanBrowserPlayMime should allow empty mime');
        ohvAssert(ohvGetAudioErrorMessage({ code: 4 }, 'song.xyz').includes('song.xyz'), 'ohvGetAudioErrorMessage should include file name for unsupported media');
        ohvAssert(ohvGetAudioErrorMessage({ code: 3 }, 'broken.mp3').includes('decode'), 'ohvGetAudioErrorMessage should describe decode failures');
        ohvAssert(ohvGetPlaybackProgress() === 0, 'ohvGetPlaybackProgress should return zero without a duration');
        ohvAssert(ohvIsPlaying() === false, 'ohvIsPlaying should be false before playback');
        ohvAssert(ohvGetArtScale(0) === 1, 'ohvGetArtScale should be neutral when paused');
        ohvAssert(ohvGetDotScale(0) === 1, 'ohvGetDotScale should be neutral when paused');

        const ohvStart = ohvGetPointOnRoundedSquare(100, 100, 80, 12, 0);
        ohvAssert(Math.round(ohvStart.x) === 100 && Math.round(ohvStart.y) === 60, 'rounded square progress should start at top center');

        const ohvQuarter = ohvGetPointOnRoundedSquare(100, 100, 80, 12, 0.25);
        ohvAssert(Math.round(ohvQuarter.x) === 140 && Math.round(ohvQuarter.y) === 100, 'rounded square progress should reach right side around quarter progress');

        const ohvPathMetrics = ohvGetProgressPathMetrics(80, 12, 3);
        const ohvBorderTrack = ohvGetPointOnRoundedSquare(100, 100, ohvPathMetrics.trackSize, ohvPathMetrics.trackRadius, 0);
        ohvAssert(Math.round(ohvBorderTrack.x) === 100 && Math.round(ohvBorderTrack.y) === 60, 'progress path should sit directly on the art border');

        const ohvCenteredArtMetrics = ohvGetCenteredArtMetrics(86);
        ohvAssert(ohvCenteredArtMetrics.artSize === 80 && ohvCenteredArtMetrics.artOffset === 3, 'art should sit centered inside a stage with 3px padding per edge');
      }

      ohvAudioInput.addEventListener('change', (ohvEvent) => {
        const ohvFile = ohvEvent.target.files?.[0];
        loadAudioFile(ohvFile);
      });

      ohvArtInput.addEventListener('change', (ohvEvent) => {
        const ohvFile = ohvEvent.target.files?.[0];
        loadImageFile(ohvFile).catch((error) => {
          console.error('Artwork load failed:', error);
        });
      });

      ohvPlayBtn.addEventListener('click', () => {
        playAudio().catch((ohvError) => {
          console.error('Play failed:', ohvError);
          ohvSetStatus('Audio playback failed. Try another file or interact with the page first.');
        });
      });

      ohvPauseBtn.addEventListener('click', pauseAudio);
      ohvResetBtn.addEventListener('click', resetAudio);

      ohvAudio.addEventListener('loadedmetadata', updateTimeUi);
      ohvAudio.addEventListener('timeupdate', updateTimeUi);
      ohvAudio.addEventListener('ended', updateTimeUi);
      ohvAudio.addEventListener('canplay', () => {
        ohvAudioReady = true;
        if (ohvStatus.textContent === 'Loading audio...') {
          ohvSetStatus('');
        }
      });
      ohvAudio.addEventListener('emptied', () => {
        ohvAudioReady = false;
      });
      ohvAudio.addEventListener('error', () => {
        ohvAudioReady = false;
        ohvSetStatus(ohvGetAudioErrorMessage(ohvAudio.error, ohvFileName.textContent));
      });

      window.addEventListener('resize', resizeCanvas);

      try {
        runTests();
      } catch (error) {
        console.error(error);
        ohvSetStatus('Internal startup test failed. Check console.');
      }

      resizeCanvas();

      if (ohvAnimationFrame) {
        cancelAnimationFrame(ohvAnimationFrame);
      }
      animate();

      ohvApplyFallbackArt().catch((error) => {
        console.error('Fallback art failed:', error);
        ohvSetStatus('Default artwork failed to load.');
      });
    })();
  </script>
</body>
</html>
